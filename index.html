<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#146c5b">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="完工報告書">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>完工報告書スマホ入力フォーム</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./icons/icon-192.png">
    <link rel="apple-touch-icon" href="./icons/icon-180.png">
    <link rel="stylesheet" href="./styles.css?v=15">
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">三条工務店</p>
          <h1>完工報告書</h1>
        </div>
        <span class="save-status" id="saveStatus">未保存</span>
      </header>

      <form id="reportForm" class="report-form">
        <section class="panel">
          <div class="section-title">
            <h2>基本情報</h2>
            <span>1/5</span>
          </div>

          <label class="field">
            <span>物件名</span>
            <input name="propertyName" type="text" autocomplete="off" placeholder="例：堺市西区鳳南町 3-..." required>
          </label>

          <div class="two-col">
            <label class="field">
              <span>担当</span>
              <input name="staffName" type="text" autocomplete="name" placeholder="例：濱野">
            </label>
            <label class="field">
              <span>確認日</span>
              <input name="inspectionDate" type="date">
            </label>
          </div>

          <label class="field">
            <span>全体メモ</span>
            <textarea name="generalMemo" rows="4" placeholder="例：床は張り替えていないためキズが残っています。"></textarea>
          </label>
        </section>

        <section class="panel">
          <div class="section-title">
            <h2>全物件共通</h2>
            <span>2/5</span>
          </div>
          <div id="commonChecks" class="check-list"></div>
        </section>

        <section class="panel">
          <div class="section-title">
            <h2>建物状況調査</h2>
            <span>3/5</span>
          </div>
          <div class="legend">
            <span>○ 問題なし</span>
            <span>△ 詳細確認</span>
            <span>× 是正</span>
            <span>- 未確認</span>
          </div>
          <div id="inspectionChecks" class="inspection-list"></div>
        </section>

        <section class="panel">
          <div class="section-title">
            <h2>写真</h2>
            <span>4/5</span>
          </div>

          <label class="upload-box">
            <input id="completionPhotos" type="file" accept="image/*" multiple>
            <strong>完工写真を追加</strong>
            <span>写真アルバムから複数選択できます</span>
          </label>
          <div id="completionPreview" class="photo-grid"></div>

          <label class="upload-box correction-upload">
            <input id="correctionPhotos" type="file" accept="image/*" multiple>
            <strong>是正箇所の写真を追加</strong>
            <span>写真アルバムから選び、部位と依頼文を作成できます</span>
          </label>
          <div id="correctionList" class="correction-list"></div>
        </section>

        <section class="panel">
          <div class="section-title">
            <h2>出力</h2>
            <span>5/5</span>
          </div>
          <div class="action-grid">
            <button class="primary" type="button" id="previewButton">報告書プレビュー</button>
            <button type="button" id="exportJsonButton">JSON保存</button>
            <button type="button" id="resetButton">入力リセット</button>
          </div>
        </section>
      </form>
    </main>

    <dialog id="previewDialog" class="preview-dialog">
      <div class="dialog-bar">
        <strong>出力プレビュー</strong>
        <div class="dialog-actions">
          <button type="button" id="printButton">印刷 / PDF保存</button>
          <button type="button" id="closePreviewButton">閉じる</button>
        </div>
      </div>
      <article id="reportPreview" class="print-sheet"></article>
    </dialog>

    <div id="printRoot" class="print-root" aria-hidden="true"></div>

    <script src="./app.js?v=15"></script>
  </body>
</html>
